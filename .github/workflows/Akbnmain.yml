name: Compile Kernel

on:
  workflow_dispatch:
    inputs:
      clang_version:
        description: "Select Clang version"
        required: true
        type: choice
        options:
          - clang-r547379
          - clang-r583297
      kernel_source:
        description: "Kernel Source Link"
        required: true
        type: string
        default: "https://github.com/AlphaDroid-devices/kernel_oneplus_sm8550"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workflow
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm

      - name: Clone Kernel Source (Full Auto Mode)
        run: |
          # Kontihi branch na takta clone karnyacha prayatna
          git clone --depth=1 ${{ github.event.inputs.kernel_source }} kernel_source
          cd kernel_source
          echo "SUCCESS: Cloned $(git branch --show-current) branch."

      - name: Download Clang Compiler
        run: |
          mkdir clang
          cd clang
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${{ github.event.inputs.clang_version }}.tar.gz
          tar -xf *.tar.gz
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Inject Kpatch Next & Kprobes Configs
        run: |
          cd kernel_source
          # SM8550 sathi defconfig shodhanyacha prayatna
          DEFCONFIG_PATH=$(find arch/arm64/configs/ -name "*sm8550_defconfig" -o -name "*vendor_defconfig" | head -n 1)
          
          if [ -z "$DEFCONFIG_PATH" ]; then
             echo "Defconfig not found in vendor, searching all configs..."
             DEFCONFIG_PATH=$(find arch/arm64/configs/ -name "*defconfig" | head -n 1)
          fi

          echo "Injecting into: $DEFCONFIG_PATH"
          sed -i 's/# CONFIG_KPROBES is not set/CONFIG_KPROBES=y/' "$DEFCONFIG_PATH"
          {
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_KPROBE_EVENTS=y"
            echo "CONFIG_HAVE_KPROBES=y"
            echo "CONFIG_KPROBES_ON_FTRACE=y"
            echo "CONFIG_DYNAMIC_FTRACE=y"
            echo "CONFIG_DYNAMIC_FTRACE_WITH_REGS=y"
            echo "CONFIG_FTRACE=y"
            echo "CONFIG_KPATCH=y"
            echo "CONFIG_KALLSYMS=y"
            echo "CONFIG_KALLSYMS_ALL=y"
          } >> "$DEFCONFIG_PATH"

      - name: Start Kernel Compilation
        run: |
          cd kernel_source
          # Finding defconfig name for make command
          CONF_NAME=$(basename $(find arch/arm64/configs/ -name "*sm8550_defconfig" -o -name "*vendor_defconfig" | head -n 1))
          make O=out ARCH=arm64 $CONF_NAME
          make O=out ARCH=arm64 -j$(nproc) \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus12R-Kernel-A16
          path: kernel_source/out/arch/arm64/boot/Image.gz
          
